name: Delete Artifact
description: Delete an uploaded artifact
author: Cupel

inputs:
  name:
    description: Artifact name
    required: true

runs:
  using: composite
  steps:
    - name: 'Delete ${{ inputs.name }}'
      uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b
      with:
        name: '${{ inputs.name }}'
