name: Docker Build Target
description: Build dockerfile target
author: Cupel
branding:
  icon: square
  color: blue

inputs:
  arguments:
    description: Additional arguments for the build command
    required: false
  dockerfile:
    description: The dockerfile to build
    required: true
    default: Dockerfile
  name:
    description: The name of the image
    required: true
  tag:
    description: The tag of the image
    required: true
  target:
    description: The target to build
    required: true
  working-directory:
    description: Directory that contains the dockerfile
    default: ./
    required: true
outputs:
  image-identifier:
    description: The image identifier
    value: '${{inputs.name}}:${{inputs.tag}}'

runs:
  using: composite
  steps:
    - name: Build ${{ inputs.target }}
      shell: bash
      working-directory: '${{ inputs.working-directory }}'
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        TARGET: ${{ inputs.target }}
        IMAGE_NAME: ${{ inputs.name }}
        IMAGE_TAG: ${{ inputs.tag }}
        BUILD_ARGS: ${{ inputs.arguments }}
      run: |
        docker build -f "$DOCKERFILE" --target "$TARGET" -t "$IMAGE_NAME:$IMAGE_TAG" $BUILD_ARGS .
