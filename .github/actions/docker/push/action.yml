name: Docker Push
description: Pushes a Docker image to a registry
author: Cupel
branding:
  icon: upload
  color: blue

inputs:
  image-identifier:
    description: The image identifier to push
    required: false

runs:
  using: composite
  steps:
    - name: Push ${{ inputs.image-identifier }}
      shell: bash
      env:
        IMAGE_IDENTIFIER: ${{ inputs.image-identifier }}
      run: |
        docker push "$IMAGE_IDENTIFIER"
