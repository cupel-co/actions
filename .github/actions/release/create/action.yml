name: Release
description: Create a release from a GitHub tag
author: Cupel

inputs:
  files:
    description: Files to include in GitHub Release
    required: false
  tag:
    description: Tag value
    required: true
  token:
    description: Token for GitHub interactions
    required: true
outputs:
  changes:
    description: The changes for the release
    value: '${{ steps.changelog.outputs.changes }}'

runs:
  using: composite
  steps:
    - name: Generate changelog
      id: changelog
      uses: requarks/changelog-action@b78a3354a01f4a1affb484b9264b506a815c46b1
      with:
        excludeTypes: ''
        includeInvalidCommits: true
        token: '${{ inputs.token }}'
        tag: '${{ inputs.tag }}'
        useGitmojis: false
        writeToFile: false
    - name: Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
      with:
        body: '${{ steps.changelog.outputs.changes }}'
        files: ${{ inputs.files }}
        make_latest: true
        tag_name: '${{ inputs.tag }}'
        token: '${{ inputs.token }}'