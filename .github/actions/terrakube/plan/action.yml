name: Terrakube Plan
description: Trigger a Terrakube plan job for a workspace and poll for completion
author: Cupel

inputs:
  terrakube_token:
    description: Terrakube Personal Access Token or Team API Token.
    required: true
  terrakube_endpoint:
    description: Base URL of the Terrakube API (e.g. https://terrakube-api.example.com).
    required: true
  terrakube_organization_id:
    description: UUID of the Terrakube organisation.
    required: true
  terrakube_workspace_name:
    description: Name of the Terrakube workspace to plan.
    required: true
  terrakube_template:
    description: Name of the plan template to use.
    default: Plan
    required: false
  branch:
    description: Branch to run the plan against.
    default: ${{ github.head_ref }}
    required: false
  show_output:
    description: Whether to stream job output to the GitHub Actions log.
    default: 'true'
    required: false

outputs:
  job_id:
    description: The Terrakube job UUID.
    value: ${{ steps.create-job.outputs.job_id }}
  job_status:
    description: Final job status (completed, failed, cancelled).
    value: ${{ steps.poll.outputs.job_status }}
  job_url:
    description: URL to the Terrakube job in the UI.
    value: ${{ steps.create-job.outputs.job_url }}

runs:
  using: composite
  steps:
    - name: Ensure jq is available
      shell: bash
      run: |
        if ! command -v jq &>/dev/null; then
          echo "jq not found, installing..."
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
        fi

    - name: Resolve workspace ID
      id: resolve-workspace
      shell: bash
      run: |
        response=$(curl -s --get -H "Authorization: Bearer ${{ inputs.terrakube_token }}" \
          --data-urlencode "name=${{ inputs.terrakube_workspace_name }}" \
          "${{ inputs.terrakube_endpoint }}/api/v1/organization/${{ inputs.terrakube_organization_id }}/workspace")

        echo "$response"

        workspace_matches=$(echo "$response" | jq -r --arg ws "${{ inputs.terrakube_workspace_name }}" '
          if type == "object" and has("data") then
            [.data[]? | select((.attributes.name // .name // empty) == $ws) | (.id // .ID)] | unique
          elif type == "array" then
            [.[]? | select((.attributes.name // .name // empty) == $ws) | (.id // .ID)] | unique
          elif type == "object" then
            if ((.attributes.name // .name // empty) == $ws) then [(.id // .ID)] else [] end
          else
            []
          end')

        match_count=$(echo "$workspace_matches" | jq 'length')

        if [[ "$match_count" -gt 1 ]]; then
          echo "::error::Multiple workspaces named '${{ inputs.terrakube_workspace_name }}' found in organisation ${{ inputs.terrakube_organization_id }}"
          exit 1
        fi

        workspace_id=$(echo "$workspace_matches" | jq -r '.[0] // empty')

        if [[ -z "$workspace_id" ]]; then
          echo "::error::Workspace '${{ inputs.terrakube_workspace_name }}' not found in organisation ${{ inputs.terrakube_organization_id }}"
          exit 1
        fi

        echo "workspace_id=$workspace_id" >> "$GITHUB_OUTPUT"
        echo "Resolved workspace '${{ inputs.terrakube_workspace_name }}' to ID: $workspace_id"

    - name: Create job
      id: create-job
      shell: bash
      run: |
        payload=$(jq -n \
          --arg org "${{ inputs.terrakube_organization_id }}" \
          --arg ws "${{ steps.resolve-workspace.outputs.workspace_id }}" \
          '{
            data: {
              type: "job",
              attributes: {
                isDestroy: false
              },
              relationships: {
                workspace: {
                  data: {
                    id: $ws,
                    type: "workspace"
                  }
                }
              }
            }
          }')

        response=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ inputs.terrakube_token }}" \
          -H "Content-Type: application/vnd.api+json" \
          -d "$payload" \
          "${{ inputs.terrakube_endpoint }}/api/v1/organization/${{ inputs.terrakube_organization_id }}/job")

        job_id=$(echo "$response" | jq -r '.data.id // .data[0].id // .id // empty')

        if [[ -z "$job_id" ]]; then
          echo "::error::Failed to create job"
          echo "$response"
          exit 1
        fi

        workspace_name="${{ inputs.terrakube_workspace_name }}"
        job_url="${{ inputs.terrakube_endpoint }}/app/${{ inputs.terrakube_organization_id }}/${workspace_name}/${job_id}"

        echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
        echo "job_url=$job_url" >> "$GITHUB_OUTPUT"
        echo "Created job $job_id"
        echo "Job URL: $job_url"

    - name: Poll for completion
      id: poll
      shell: bash
      run: |
        job_id="${{ steps.create-job.outputs.job_id }}"
        org_id="${{ inputs.terrakube_organization_id }}"
        show_output="${{ inputs.show_output }}"
        timeout=600
        interval=10
        elapsed=0
        last_output_len=0

        while true; do
          if [[ $elapsed -ge $timeout ]]; then
            echo "::error::Job $job_id timed out after 10 minutes"
            echo "job_status=timeout" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          response=$(curl -s -H "Authorization: Bearer ${{ inputs.terrakube_token }}" \
            "${{ inputs.terrakube_endpoint }}/api/v1/organization/$org_id/job/$job_id")

          status=$(echo "$response" | jq -r '.data.attributes.status // .data.status // .status // "unknown"')

          if [[ "$show_output" == "true" ]]; then
            step_response=$(curl -s -H "Authorization: Bearer ${{ inputs.terrakube_token }}" \
              "${{ inputs.terrakube_endpoint }}/api/v1/organization/$org_id/job/$job_id/step" 2>/dev/null || echo '{}')

            if [[ -n "$step_response" && "$step_response" != "{}" ]]; then
              current_output=$(echo "$step_response" | jq -r '
                if type == "object" and has("data") then [.data[].attributes.output // empty] | join("\n")
                elif type == "array" then map(.attributes.output // .output // empty) | join("\n")
                else empty
                end' 2>/dev/null || true)

              if [[ -n "$current_output" ]]; then
                current_len=${#current_output}
                if [[ $current_len -gt $last_output_len ]]; then
                  printf '%s' "${current_output:$last_output_len}"
                  last_output_len=$current_len
                fi
              fi
            fi
          fi

          case "$status" in
            completed)
              echo "Job $job_id completed successfully"
              echo "job_status=completed" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            failed)
              echo "::error::Job $job_id failed"
              echo "job_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
            cancelled)
              echo "::error::Job $job_id was cancelled"
              echo "job_status=cancelled" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
            pending|queued|running)
              echo "Job $job_id status: $status (${elapsed}s elapsed)"
              ;;
            *)
              echo "::warning::Unknown job status: $status"
              ;;
          esac

          sleep $interval
          elapsed=$((elapsed + interval))
        done
